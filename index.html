<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Daily Quote</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0818">

  <!-- iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Daily Quote">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-11JK22HMX4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-11JK22HMX4');
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06060f;
      --card-bg: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.08);
      --text: #ede8df;
      --text-muted: rgba(237,232,223,0.42);
      --accent: #c9a84c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 50%, rgba(109,40,217,0.17) 0%, transparent 100%),
        radial-gradient(ellipse 60% 50% at 85% 30%, rgba(30,64,175,0.13) 0%, transparent 100%),
        radial-gradient(ellipse 50% 40% at 50% 90%, rgba(180,120,30,0.1) 0%, transparent 100%);
      pointer-events: none;
      animation: glowPulse 10s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      from { opacity: 0.8; }
      to   { opacity: 1.15; }
    }

    /* Layout */
    .container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .app-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .date-display {
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    /* Category pills */
    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
    }

    .pill {
      padding: 5px 16px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
      transition: all 0.2s;
      user-select: none;
      font-family: inherit;
    }

    .pill:hover {
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    .pill.active {
      background: linear-gradient(135deg, rgba(109,40,217,0.65), rgba(30,64,175,0.65));
      border-color: rgba(109,40,217,0.45);
      color: #fff;
      box-shadow: 0 2px 18px rgba(109,40,217,0.25);
    }

    /* Quote card */
    .card {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      padding: 44px 50px;
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 24px 48px rgba(0,0,0,0.38);
    }

    .quote-body.fade-in {
      animation: fadeIn 0.38s ease forwards;
    }

    .quote-body.fade-out {
      animation: fadeOut 0.17s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(9px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-6px); }
    }

    .open-quote {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 5rem;
      line-height: 0.35;
      color: var(--accent);
      opacity: 0.3;
      display: block;
      margin-bottom: 18px;
      user-select: none;
    }

    .quote-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.6rem;
      font-style: italic;
      line-height: 1.72;
      color: var(--text);
      margin-bottom: 26px;
    }

    .quote-author {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .quote-author::before {
      content: '';
      display: inline-block;
      width: 22px;
      height: 1px;
      background: var(--accent);
      opacity: 0.55;
      flex-shrink: 0;
    }

    /* Actions */
    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 26px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 17px;
      border-radius: 999px;
      font-size: 0.77rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      transition: all 0.2s;
      letter-spacing: 0.02em;
      font-family: inherit;
    }

    .btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-color: rgba(255,255,255,0.18);
    }

    .btn.success {
      border-color: rgba(74,222,128,0.4);
      background: rgba(74,222,128,0.08);
      color: #86efac;
    }

    .btn-new { margin-left: auto; }

    /* Loading */
    .loading-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 46px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .footer {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.04em;
    }

    /* Responsive */
    @media (max-width: 520px) {
      .card { padding: 30px 24px; }
      .quote-text { font-size: 1.32rem; }
      .btn-new { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="app-title">Daily Quote</span>
      <span class="date-display" id="dateEl"></span>
    </div>

    <div class="categories" id="categoryNav"></div>

    <div class="card" id="card">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>

    <div class="footer">Quotes from ZenQuotes.io &amp; curated collection</div>
  </div>

  <script>
    // ── Curated quotes by category ─────────────────────────────────────────

    const LOCAL_QUOTES = {
      motivation: [
        { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
        { text: "In the middle of difficulty lies opportunity.", author: "Albert Einstein" },
        { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
        { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
        { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
        { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
        { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
        { text: "Act as if what you do makes a difference. It does.", author: "William James" },
        { text: "The harder the conflict, the greater the triumph.", author: "George Washington" },
        { text: "With the new day comes new strength and new thoughts.", author: "Eleanor Roosevelt" },
      ],
      wisdom: [
        { text: "The only true wisdom is in knowing you know nothing.", author: "Socrates" },
        { text: "Knowing yourself is the beginning of all wisdom.", author: "Aristotle" },
        { text: "He who knows others is wise; he who knows himself is enlightened.", author: "Lao Tzu" },
        { text: "The measure of intelligence is the ability to change.", author: "Albert Einstein" },
        { text: "It is not the mountain we conquer, but ourselves.", author: "Edmund Hillary" },
        { text: "Turn your wounds into wisdom.", author: "Oprah Winfrey" },
        { text: "Yesterday is history, tomorrow is a mystery, today is a gift.", author: "Bil Keane" },
        { text: "The unexamined life is not worth living.", author: "Socrates" },
        { text: "To know what you know and what you do not know—that is true knowledge.", author: "Confucius" },
        { text: "The quieter you become, the more you can hear.", author: "Ram Dass" },
      ],
      success: [
        { text: "Success is walking from failure to failure with no loss of enthusiasm.", author: "Winston Churchill" },
        { text: "Success usually comes to those who are too busy to be looking for it.", author: "Henry David Thoreau" },
        { text: "Success is not the key to happiness. Happiness is the key to success.", author: "Albert Schweitzer" },
        { text: "Don't be afraid to give up the good to go for the great.", author: "John D. Rockefeller" },
        { text: "I find that the harder I work, the more luck I seem to have.", author: "Thomas Jefferson" },
        { text: "Opportunities don't happen, you create them.", author: "Chris Grosser" },
        { text: "The successful warrior is the average man, with laser-like focus.", author: "Bruce Lee" },
        { text: "Success is the sum of small efforts, repeated day in and day out.", author: "Robert Collier" },
        { text: "There are no secrets to success. It is the result of preparation, hard work, and learning from failure.", author: "Colin Powell" },
        { text: "It is not enough to have a good mind. The main thing is to use it well.", author: "René Descartes" },
      ],
      happiness: [
        { text: "Happiness is not something ready-made. It comes from your own actions.", author: "Dalai Lama" },
        { text: "For every minute you are angry you lose sixty seconds of happiness.", author: "Ralph Waldo Emerson" },
        { text: "Count your age by friends, not years. Count your life by smiles, not tears.", author: "John Lennon" },
        { text: "The most important thing is to enjoy your life—to be happy—it's all that matters.", author: "Audrey Hepburn" },
        { text: "Happiness depends upon ourselves.", author: "Aristotle" },
        { text: "The happiness of your life depends upon the quality of your thoughts.", author: "Marcus Aurelius" },
        { text: "There is only one way to happiness and that is to cease worrying about things beyond our will.", author: "Epictetus" },
        { text: "Happiness is when what you think, what you say, and what you do are in harmony.", author: "Mahatma Gandhi" },
        { text: "The purpose of our lives is to be happy.", author: "Dalai Lama" },
        { text: "Joy is not in things; it is in us.", author: "Richard Wagner" },
      ],
      life: [
        { text: "Life is what happens to you while you're busy making other plans.", author: "John Lennon" },
        { text: "Get busy living or get busy dying.", author: "Stephen King" },
        { text: "You only live once, but if you do it right, once is enough.", author: "Mae West" },
        { text: "In the end, it's not the years in your life that count. It's the life in your years.", author: "Abraham Lincoln" },
        { text: "To live is the rarest thing in the world. Most people exist, that is all.", author: "Oscar Wilde" },
        { text: "Life is either a daring adventure or nothing at all.", author: "Helen Keller" },
        { text: "Life is ten percent what happens to you and ninety percent how you respond to it.", author: "Charles Swindoll" },
        { text: "We do not remember days, we remember moments.", author: "Cesare Pavese" },
        { text: "The good life is one inspired by love and guided by knowledge.", author: "Bertrand Russell" },
        { text: "Life is not measured by the number of breaths we take, but by the moments that take our breath away.", author: "Maya Angelou" },
      ],
      focus: [
        { text: "Concentrate all your thoughts upon the work at hand. The sun's rays do not burn until brought to a focus.", author: "Alexander Graham Bell" },
        { text: "The secret of getting things done is to act.", author: "Dante Alighieri" },
        { text: "You can do anything, but not everything.", author: "David Allen" },
        { text: "It is not enough to be busy. The question is: what are we busy about?", author: "Henry David Thoreau" },
        { text: "Lack of direction, not lack of time, is the problem. We all have twenty-four hour days.", author: "Zig Ziglar" },
        { text: "The successful warrior is the average man, with laser-like focus.", author: "Bruce Lee" },
        { text: "Starve your distractions. Feed your focus.", author: "Unknown" },
        { text: "Where focus goes, energy flows.", author: "Tony Robbins" },
        { text: "The main thing is to keep the main thing the main thing.", author: "Stephen Covey" },
        { text: "Energy is the essence of life. Every day you decide how you're going to use it.", author: "Oprah Winfrey" },
      ],
      drive: [
        { text: "Energy and persistence conquer all things.", author: "Benjamin Franklin" },
        { text: "What you get by achieving your goals is not as important as what you become by achieving your goals.", author: "Zig Ziglar" },
        { text: "The only limit to our realization of tomorrow is our doubts of today.", author: "Franklin D. Roosevelt" },
        { text: "A dream doesn't become reality through magic; it takes sweat, determination, and hard work.", author: "Colin Powell" },
        { text: "Don't wish it were easier. Wish you were better.", author: "Jim Rohn" },
        { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
        { text: "Push yourself, because no one else is going to do it for you.", author: "Unknown" },
        { text: "The difference between the impossible and the possible lies in a person's determination.", author: "Tommy Lasorda" },
        { text: "Discipline is the bridge between goals and accomplishment.", author: "Jim Rohn" },
        { text: "There is no substitute for hard work.", author: "Thomas Edison" },
      ],
      sports: [
        { text: "Champions keep playing until they get it right.", author: "Billie Jean King" },
        { text: "It's not whether you get knocked down; it's whether you get up.", author: "Vince Lombardi" },
        { text: "The more difficult the victory, the greater the happiness in winning.", author: "Pelé" },
        { text: "You miss 100% of the shots you don't take.", author: "Wayne Gretzky" },
        { text: "Never give up! Failure and rejection are only the first step to succeeding.", author: "Jim Valvano" },
        { text: "The harder the battle, the sweeter the victory.", author: "Les Brown" },
        { text: "Gold medals aren't really made of gold. They're made of sweat, determination, and a hard-to-find alloy called guts.", author: "Dan Gable" },
        { text: "You have to expect things of yourself before you can do them.", author: "Michael Jordan" },
        { text: "It ain't over till it's over.", author: "Yogi Berra" },
        { text: "Pain is temporary. Quitting lasts forever.", author: "Lance Armstrong" },
      ],
    };

    const CATEGORIES = ['today', 'motivation', 'wisdom', 'success', 'happiness', 'life', 'focus', 'drive', 'sports'];

    // ── State ──────────────────────────────────────────────────────────────

    let activeCategory = 'today';
    let currentQuote = null;

    // Per-category sequential index (starts at a random offset each session)
    const categoryIdx = {};
    Object.keys(LOCAL_QUOTES).forEach(cat => {
      categoryIdx[cat] = Math.floor(Math.random() * LOCAL_QUOTES[cat].length);
    });

    // Separate sequential index for random browsing while on "Today" tab
    const allQuotes = Object.values(LOCAL_QUOTES).flat();
    let todayBrowseIdx = Math.floor(Math.random() * allQuotes.length);

    // ── Helpers ────────────────────────────────────────────────────────────

    function todayStr() {
      return new Date().toDateString();
    }

    function formatDate(d) {
      return d.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
      });
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function decodeEntities(s) {
      const el = document.createElement('textarea');
      el.innerHTML = s;
      return el.value;
    }

    // Deterministic daily fallback: same quote for a given calendar day
    function getDailyLocalQuote() {
      const start = new Date(new Date().getFullYear(), 0, 0);
      const day = Math.floor((Date.now() - start) / 86400000);
      return allQuotes[day % allQuotes.length];
    }

    function nextCategoryQuote(cat) {
      const pool = LOCAL_QUOTES[cat];
      const q = pool[categoryIdx[cat] % pool.length];
      categoryIdx[cat]++;
      return q;
    }

    // ── API ────────────────────────────────────────────────────────────────

    async function fetchDailyQuote() {
      const CACHE_KEY = 'dq_v1';
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        const { date, quote } = JSON.parse(cached);
        if (date === todayStr()) return quote;
      }
      try {
        const res = await fetch('https://daily-quote-app.kyle-kensrue.workers.dev/');
        if (!res.ok) throw new Error('bad status');
        const data = await res.json();
        const quote = {
          text: decodeEntities(data[0].q),
          author: decodeEntities(data[0].a),
        };
        localStorage.setItem(CACHE_KEY, JSON.stringify({ date: todayStr(), quote }));
        return quote;
      } catch {
        return getDailyLocalQuote();
      }
    }

    // ── Render ─────────────────────────────────────────────────────────────

    function renderLoading() {
      document.getElementById('card').innerHTML =
        '<div class="loading-wrap"><div class="spinner"></div></div>';
    }

    function renderCard(quote) {
      currentQuote = quote;
      const card = document.getElementById('card');

      const buildContent = () => `
        <div class="quote-body fade-in">
          <span class="open-quote">\u201C</span>
          <p class="quote-text">${escapeHtml(quote.text)}</p>
          <div class="quote-author">${escapeHtml(quote.author)}</div>
          <div class="actions">
            <button class="btn" id="copyBtn" onclick="copyQuote()">
              ${iconCopy()} Copy
            </button>
            <button class="btn" onclick="shareQuote()">
              ${iconShare()} Share
            </button>
            <button class="btn btn-new" onclick="newQuote()">
              ${iconRefresh()} New Quote
            </button>
          </div>
        </div>
      `;

      const existing = card.querySelector('.quote-body');
      if (existing) {
        existing.classList.remove('fade-in');
        existing.classList.add('fade-out');
        setTimeout(() => { card.innerHTML = buildContent(); }, 170);
      } else {
        card.innerHTML = buildContent();
      }
    }

    function renderCategories() {
      document.getElementById('categoryNav').innerHTML = CATEGORIES.map(cat => `
        <button class="pill ${cat === activeCategory ? 'active' : ''}"
                onclick="selectCategory('${cat}')">
          ${cat.charAt(0).toUpperCase() + cat.slice(1)}
        </button>
      `).join('');
    }

    // ── Interactions ───────────────────────────────────────────────────────

    function track(event, params) {
      if (typeof gtag === 'function') gtag('event', event, params);
    }

    async function selectCategory(cat) {
      if (cat === activeCategory) return;
      activeCategory = cat;
      renderCategories();
      track('select_category', { category: cat });

      if (cat === 'today') {
        renderLoading();
        renderCard(await fetchDailyQuote());
      } else {
        renderCard(nextCategoryQuote(cat));
      }
    }

    function newQuote() {
      if (activeCategory === 'today') {
        todayBrowseIdx = (todayBrowseIdx + 1) % allQuotes.length;
        renderCard(allQuotes[todayBrowseIdx]);
      } else {
        renderCard(nextCategoryQuote(activeCategory));
      }
      track('new_quote', { category: activeCategory });
    }

    async function copyQuote() {
      if (!currentQuote) return;
      const text = `"${currentQuote.text}" — ${currentQuote.author}`;

      try {
        await navigator.clipboard.writeText(text);
      } catch {
        // Fallback for older browsers / file:// protocol
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }

      track('copy_quote', { category: activeCategory, author: currentQuote.author });

      const btn = document.getElementById('copyBtn');
      if (!btn) return;
      btn.classList.add('success');
      btn.innerHTML = `${iconCheck()} Copied!`;
      setTimeout(() => {
        btn.classList.remove('success');
        btn.innerHTML = `${iconCopy()} Copy`;
      }, 2000);
    }

    async function shareQuote() {
      if (!currentQuote) return;
      const text = `"${currentQuote.text}" — ${currentQuote.author}`;
      if (navigator.share) {
        try {
          await navigator.share({ title: 'Daily Quote', text });
          track('share_quote', { method: 'native', category: activeCategory, author: currentQuote.author });
          return;
        } catch { /* cancelled or unavailable */ }
      }
      // Fallback: copy
      track('share_quote', { method: 'copy_fallback', category: activeCategory, author: currentQuote.author });
      await copyQuote();
    }

    // ── Icons (inline SVG) ─────────────────────────────────────────────────

    function iconCopy() {
      return `<svg width="13" height="13" viewBox="0 0 16 16" fill="none"
                   stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="5" width="9" height="9" rx="1.5"/>
                <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2H2.5A1.5 1.5 0 0 0 1 3.5v7A1.5 1.5 0 0 0 2.5 12H4"/>
              </svg>`;
    }

    function iconShare() {
      return `<svg width="13" height="13" viewBox="0 0 16 16" fill="none"
                   stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <circle cx="12.5" cy="2.5" r="1.5"/>
                <circle cx="12.5" cy="13.5" r="1.5"/>
                <circle cx="3.5" cy="8" r="1.5"/>
                <line x1="11.1" y1="3.3" x2="4.9" y2="7.2"/>
                <line x1="11.1" y1="12.7" x2="4.9" y2="8.8"/>
              </svg>`;
    }

    function iconRefresh() {
      return `<svg width="13" height="13" viewBox="0 0 16 16" fill="none"
                   stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.86 4.4 2.2"/>
                <polyline points="13.5,1 13.5,5 9.5,5"/>
              </svg>`;
    }

    function iconCheck() {
      return `<svg width="13" height="13" viewBox="0 0 16 16" fill="none"
                   stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="2,8 6,12 14,4"/>
              </svg>`;
    }

    // ── Init ───────────────────────────────────────────────────────────────

    async function init() {
      document.getElementById('dateEl').textContent = formatDate(new Date());
      renderCategories();
      renderLoading();
      renderCard(await fetchDailyQuote());
    }

    init();

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
